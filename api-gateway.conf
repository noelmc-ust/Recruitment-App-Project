worker_processes auto;
events { worker_connections 1024; }

http {
  client_max_body_size 10m;

  # (Optional) basic logging to debug quickly
  log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                  '$status $body_bytes_sent "$http_referer" "$http_user_agent" '
                  'rt=$request_time uct=$upstream_connect_time uht=$upstream_header_time urt=$upstream_response_time';
  access_log /var/log/nginx/access.log main;
  error_log  /var/log/nginx/error.log warn;

  server {
    listen 80;

    # Gateway health
    location = /healthz { return 200 "ok\n"; }

    # Global CORS headers (applied to all responses unless overridden)
    add_header Access-Control-Allow-Origin * always;
    add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Content-Type, Authorization" always;
    add_header Access-Control-Allow-Credentials true always;

    # Static/app HTML & assets under /api/app/  -> upstream root
    # /api/app/login.html -> http://recruitmentapp:3000/login.html
    location /api/app/ {
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;

      proxy_http_version 1.1;
      proxy_set_header Connection "";

      proxy_pass http://recruitmentapp:3000/;  # trailing slash strips /api/app/
    }

    # API calls under /api/ -> upstream /api/ (no strip)
    # /api/login -> http://recruitmentapp:3000/api/login
    location /api/ {
      # Proper preflight handling (now 'if in location', which is allowed)
      if ($request_method = OPTIONS) {
        add_header Access-Control-Allow-Origin * always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type, Authorization" always;
        add_header Access-Control-Max-Age 86400 always;
        return 204;
      }

      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;

      proxy_http_version 1.1;
      proxy_set_header Connection "";

      proxy_read_timeout 60s;
      proxy_send_timeout 60s;

      proxy_pass http://recruitmentapp:3000;   # no trailing slash preserves /api/
    }
  }
}