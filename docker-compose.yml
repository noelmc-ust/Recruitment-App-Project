version: '3.8'

networks:
  recruitment-app:
  recruitment-database:

volumes:
  mongodb:

services:
  recruitmentapp:
    image: nmc9812/recruitmentapp:v1.1.0
    container_name: recruitmentapp
    environment:
      - NODE_ENV=production
      - PORT=3000
      - MONGO_URI=mongodb://hrapp:hrapp123@dbgateway:27017/hr_system?authSource=hr_system
      - DB_NAME=hr_system
      - DEFAULT_ADMIN_ID=project
      - DEFAULT_ADMIN_PASSWORD=project123
    networks:
      - recruitment-app
    depends_on:
      - dbgateway
  
  dbgateway:
    image: nginx
    container_name: dbgateway
    networks:
      - recruitment-app
      - recruitment-database
    depends_on:
      - mongodb
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro

  api-gateway:
    image: nginx
    container_name: api-gateway
    networks:
      - recruitment-app
    ports:
      - "80:80"
    volumes:
      - ./api-gateway.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - recruitmentapp

  mongodb:
    image: mongo:8
    container_name: mongodb
    environment:
      - MONGO_INITDB_ROOT_USERNAME=rootuser
      - MONGO_INITDB_ROOT_PASSWORD=rootpassword
    volumes:
      - mongodb:/data/db
      - ./mongo-init:/docker-entrypoint-initdb.d:ro
    networks:
      - recruitment-database
